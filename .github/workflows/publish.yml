name: Publish Package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Test and publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}. Expected ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check JavaScript syntax
        run: npm run check

      - name: Check TypeScript declarations
        run: npm run typecheck

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Preview package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish
